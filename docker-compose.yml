version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: inventory_db_container
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inventory_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_backend_container
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      APP_NAME: "Inventory & Order Management System"
      DEBUG: "True"
      DATABASE_URL: ""
      POSTGRES_HOST: "db"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:5175"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8000/api/v1"
    container_name: inventory_frontend_container
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
