## Render Blueprint — Inventory & Order Management System
## Docs: https://render.com/docs/blueprint-spec

services:
  # ─────────────────────────────────────────────
  # Backend — FastAPI Web Service
  # ─────────────────────────────────────────────
  - type: web
    name: inventory-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_NAME
        value: "Inventory & Order Management System"
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://inventory-frontend.onrender.com,http://localhost:5173"
    autoDeploy: true

# ─────────────────────────────────────────────
# Managed PostgreSQL Database
# ─────────────────────────────────────────────
databases:
  - name: inventory-db
    region: oregon
    plan: free
    databaseName: inventory_db
    user: inventory_user
